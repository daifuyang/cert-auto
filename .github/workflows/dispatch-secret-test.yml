name: Dispatch Secret Test

on:
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    environment: PRODUCTION
    steps:
      - name: Setup config from secret
        env:
          AIC_CONFIG: ${{ secrets.AIC_CONFIG }}
        run: |
          mkdir -p ~/.config/aic
          printf '%s\n' "$AIC_CONFIG" > ~/.config/aic/config.toml
      - run: test -f ~/.config/aic/config.toml && echo ok
