name: Cert Auto Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'

env:
  AIC_VERSION: '0.1.2-dev.1'
  NODE_VERSION: '20'

jobs:
  qiniu-cert-renew:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup config
        env:
          AIC_CONFIG: ${{ secrets.AIC_CONFIG }}
        run: |
          mkdir -p ~/.config/aic
          printf '%s\n' "$AIC_CONFIG" > ~/.config/aic/config.toml

      - name: Install acme.sh
        run: |
          curl https://get.acme.sh | sh -s email=admin@zerocmf.com

      - name: Install aic CLI
        run: |
          npm install -g @zerocmf/aic@${{ env.AIC_VERSION }}

      - name: Verify aic installation
        run: aic --version

      - name: Renew Qiniu CDN certificates
        run: |
          aic cert:renew --dry-run

      - name: Renew ACME cert only when near expiry
        run: |
          DOMAIN="cdn.vlog-v.com"
          ACME="/home/runner/.acme.sh/acme.sh"
          CERT_FILE="/home/runner/.acme.sh/${DOMAIN}/fullchain.cer"
          DAYS=30

          eval "$(python3 - <<'PY'
import tomllib
from pathlib import Path

cfg = tomllib.loads(Path.home().joinpath('.config/aic/config.toml').read_text())
aliyun = cfg.get('aliyun', {})
default_profile = aliyun.get('default-profile', 'personal')
profiles = aliyun.get('profiles', {})
p = profiles.get(default_profile, {})
ak = p.get('accessKeyId', '')
sk = p.get('accessKeySecret', '')

if not ak or not sk:
    ak = aliyun.get('accessKeyId', '')
    sk = aliyun.get('accessKeySecret', '')

if not ak or not sk:
    raise SystemExit('echo "Aliyun credentials not found in AIC_CONFIG"; exit 1')

print(f'export Ali_Key="{ak}"')
print(f'export Ali_Secret="{sk}"')
PY
)"

          if [ -f "$CERT_FILE" ]; then
            END_DATE=$(openssl x509 -enddate -noout -in "$CERT_FILE" | cut -d= -f2)
            END_TS=$(date -d "$END_DATE" +%s)
            NOW_TS=$(date +%s)
            LEFT_DAYS=$(( (END_TS - NOW_TS) / 86400 ))
            echo "Local cert remaining days: ${LEFT_DAYS}"

            if [ "$LEFT_DAYS" -gt "$DAYS" ]; then
              echo "Skip renewal: local cert is not near expiry"
              exit 0
            fi

            "$ACME" --renew -d "$DOMAIN" --dns dns_ali --keylength 4096 --debug 2
          else
            echo "No local cert found, issuing new cert"
            "$ACME" --issue --dns dns_ali -d "$DOMAIN" --email 1140444693@qq.com --keylength 4096 --debug 2
          fi
