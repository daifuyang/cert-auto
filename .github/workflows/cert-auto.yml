name: Cert Auto Renew

on:
  workflow_dispatch:
    inputs:
      renew_days:
        description: Renew if cert expires within N days
        required: false
        default: "30"
  schedule:
    - cron: '0 12 * * *'

concurrency:
  group: cert-auto-renew
  cancel-in-progress: false

env:
  AIC_VERSION: '0.1.2-dev.2'
  NODE_VERSION: '20'

jobs:
  cert-renew:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup config
        env:
          AIC_CONFIG: ${{ secrets.AIC_CONFIG }}
        run: |
          mkdir -p ~/.config/aic
          printf '%s\n' "$AIC_CONFIG" > ~/.config/aic/config.toml

      - name: Install acme.sh
        run: |
          curl https://get.acme.sh | sh -s email=admin@zerocmf.com

      - name: Install aic CLI
        run: |
          npm install -g @zerocmf/aic@${{ env.AIC_VERSION }}

      - name: Install Aliyun CLI
        run: |
          curl -fsSL https://aliyuncli.alicdn.com/install.sh | sudo bash

      - name: Configure Aliyun CLI
        run: |
          node scripts/configure-aliyun-cli-from-aic.mjs enterprise cn-shanghai

      - name: Verify aic installation
        run: aic --version

      - name: Renew Qiniu CDN certificates
        run: |
          aic cert:renew --days "${{ github.event.inputs.renew_days || '30' }}" --dry-run

      - name: Execute renewal based on Qiniu cert status
        run: |
          aic cert:renew --days "${{ github.event.inputs.renew_days || '30' }}"

      - name: Renew CodeCloud Aliyun FC certificate
        run: |
          ./scripts/run-cert-flow.sh \
            --renew-days "${{ github.event.inputs.renew_days || '30' }}" \
            --profile enterprise \
            --domain codecloud.ltd \
            --domain www.codecloud.ltd \
            --fc-domain codecloud.ltd \
            --fc-domain www.codecloud.ltd \
            --fc-region cn-shanghai

      - name: Notify on failure (WeChat)
        if: failure()
        env:
          WECHAT_OPENID: ${{ secrets.WECHAT_OPENID }}
        run: |
          if [ -z "$WECHAT_OPENID" ]; then
            echo "WECHAT_OPENID is empty, skip notification"
            exit 0
          fi
          aic notify:send "${{ secrets.WECHAT_OPENID }}" \
            "证书续期失败" \
            "仓库: ${{ github.repository }} 运行: ${{ github.run_id }}" \
            -u "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -t "证书告警" \
            -r "请尽快处理并重试"
