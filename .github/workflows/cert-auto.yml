name: Cert Auto Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'

env:
  AIC_VERSION: '0.1.2-dev.2'
  NODE_VERSION: '20'

jobs:
  qiniu-cert-renew:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup config
        env:
          AIC_CONFIG: ${{ secrets.AIC_CONFIG }}
        run: |
          mkdir -p ~/.config/aic
          printf '%s\n' "$AIC_CONFIG" > ~/.config/aic/config.toml

      - name: Install acme.sh
        run: |
          curl https://get.acme.sh | sh -s email=admin@zerocmf.com

      - name: Install aic CLI
        run: |
          npm install -g @zerocmf/aic@${{ env.AIC_VERSION }}

      - name: Verify aic installation
        run: aic --version

      - name: Renew Qiniu CDN certificates
        run: |
          aic cert:renew --dry-run

      - name: Execute renewal based on Qiniu cert status
        run: |
          aic cert:renew
